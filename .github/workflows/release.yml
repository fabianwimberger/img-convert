name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            deb: true
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
          - os: macos-14
            target: aarch64-apple-darwin
            archive: tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: target
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package archive (Unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          STAGE="img-convert-${VERSION}-${{ matrix.target }}"
          mkdir -p "dist/${STAGE}"
          cp "target/${{ matrix.target }}/release/img-convert" "dist/${STAGE}/"
          cp README.md LICENSE "dist/${STAGE}/"
          tar -C dist -czf "dist/${STAGE}.tar.gz" "${STAGE}"
          rm -rf "dist/${STAGE}"

      - name: Package archive (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          STAGE="img-convert-${VERSION}-${{ matrix.target }}"
          mkdir -p "dist/${STAGE}"
          cp "target/${{ matrix.target }}/release/img-convert.exe" "dist/${STAGE}/"
          cp README.md LICENSE "dist/${STAGE}/"
          (cd dist && 7z a "${STAGE}.zip" "${STAGE}" >/dev/null)
          rm -rf "dist/${STAGE}"

      - name: Install cargo-deb
        if: matrix.deb
        run: cargo install cargo-deb --locked

      - name: Build .deb
        if: matrix.deb
        run: cargo deb --no-build --target ${{ matrix.target }} --output dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.deb
          if-no-files-found: error

  publish:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: sha256sum * > SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.deb
            dist/SHA256SUMS
          generate_release_notes: true
          draft: true
          fail_on_unmatched_files: true
